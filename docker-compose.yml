x-common: &common
  build: .
  image: xray-agent:latest
  restart: unless-stopped
  env_file:
    - .env
  volumes:
    - /var/log/xray:/var/log/xray:ro
    - /etc/localtime:/etc/localtime:ro
  depends_on:
    redis:
      condition: service_healthy
  logging:
    driver: "json-file"
    options:
      max-size: "50m"
      max-file: "5"

services:
  redis:
    image: redis:7-alpine
    container_name: xray-agent-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --save ""
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 60
      --timeout 0
      --loglevel notice
    volumes:
      - redis-data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  xray-agent-api:
    <<: *common
    container_name: xray-agent-api
    network_mode: host
    environment:
      REDIS_URL: "redis://127.0.0.1:6379/0"
      XRAY_API_ADDR: "127.0.0.1:10085"
    command: >
      python -m uvicorn app.main:app --host 0.0.0.0 --port 18000

  xray-agent-worker:
    <<: *common
    container_name: xray-agent-worker
    network_mode: host
    environment:
      REDIS_URL: "redis://127.0.0.1:6379/0"
      XRAY_API_ADDR: "127.0.0.1:10085"
    command: ["python", "worker.py"]

  xray-guard:
    <<: *common
    container_name: xray-guard
    network_mode: host
    environment:
      REDIS_URL: "redis://127.0.0.1:6379/0"
      XRAY_API_ADDR: "127.0.0.1:10085"
    command: ["python", "-m", "app.workers.xray_guard.main"]

volumes:
  redis-data: