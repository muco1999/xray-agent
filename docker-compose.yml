# Общий шаблон для сервисов (API, worker, guard)
x-common: &common
  build: .
  restart: unless-stopped
  env_file:
    - .env
  volumes:
    - /var/log/xray:/var/log/xray:ro
    - /etc/localtime:/etc/localtime:ro
  depends_on:
    redis:
      condition: service_healthy
  logging:
    driver: "json-file"
    options:
      max-size: "50m"
      max-file: "5"

services:
  redis:
    image: redis:7-alpine
    container_name: xray-agent-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --save ""
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 60
      --timeout 0
      --loglevel notice
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli ping | grep -q PONG" ]
      interval: 5s
      timeout: 3s
      retries: 10
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  xray-agent-api:
    <<: *common
    image: xray-agent-api:korea1
    environment:
      REDIS_URL: "redis://redis:6379/0"
      XRAY_API_ADDR: "host.docker.internal:10085"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "18000:18000"
    command: >
      python -m uvicorn app.main:app --host 0.0.0.0 --port 18000

  xray-agent-worker:
    <<: *common
    image: xray-agent-worker:korea1
    environment:
      REDIS_URL: "redis://redis:6379/0"
      XRAY_API_ADDR: "host.docker.internal:10085"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: [ "python", "worker.py" ]

  xray-guard:
    <<: *common
    image: xray-guard:korea1
    environment:
      REDIS_URL: "redis://redis:6379/0"
      XRAY_API_ADDR: "host.docker.internal:10085"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: [ "python", "-m", "app.workers.xray_guard.main" ]

volumes:
  redis-data: